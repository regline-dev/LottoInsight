# 매주 추첨 후 동행복권 API → data/lotto-draws.json → main push → Vercel 재배포
name: Sync lotto draws

on:
  schedule:
    # 토 21:30 KST (= 12:30 UTC) — 추첨(~20:45) 이후
    - cron: "30 12 * * 6"
  # Actions 탭에서 수동 실행
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-lotto-draws
  cancel-in-progress: false

jobs:
  sync-draws:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Sync draws from API
        run: npm run sync:draws

      - name: Commit and push if JSON changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/lotto-draws.json
          if git diff --staged --quiet; then
            echo "변경 없음 — 커밋 스킵"
            exit 0
          fi
          git commit -m "chore: sync lotto draws to latest round"
          git push
